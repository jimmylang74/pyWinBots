<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>pyWinBots</title>
<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242838;
  --border:#2d3248;--text:#e1e5ee;--text-dim:#8b90a5;
  --primary:#6c8cff;--green:#3ecf8e;--red:#f56c6c;
  --radius:8px;--font:'SF Mono','Cascadia Code','Consolas',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ---- header ---- */
.header{display:flex;align-items:center;gap:16px;padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:600}
.header .badge{background:var(--primary);color:#fff;font-size:11px;padding:2px 10px;border-radius:99px;font-weight:500}
.nav{margin-left:auto;display:flex;gap:8px}
.nav button{background:none;border:none;color:var(--text-dim);font-size:14px;padding:6px 14px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.nav button:hover,.nav button.active{color:var(--text);background:var(--surface2)}

/* ---- layout ---- */
.container{max-width:1200px;margin:0 auto;padding:24px 32px}
.page{display:none}
.page.active{display:block}

/* ---- stats ---- */
.stats{display:flex;gap:16px;margin-bottom:28px}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 24px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .label{font-size:12px;color:var(--text-dim);margin-top:4px}

/* ---- search ---- */
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;max-width:360px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--primary)}

/* ---- plugin grid ---- */
.plugin-grid{display:grid;gap:16px}
.plugin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:flex-start;gap:16px}
.plugin-card .info{flex:1;min-width:0}
.plugin-card .name{font-size:16px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.plugin-card .desc{font-size:13px;color:var(--text-dim)}
.plugin-card .caps{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.plugin-card .caps span{background:var(--surface2);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:4px;font-family:var(--font)}
.plugin-card .status{min-width:80px;text-align:right;font-size:13px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.dot.on{background:var(--green)}
.dot.off{background:var(--red)}

/* ---- toggle ---- */
.toggle-wrap{margin-top:8px;display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--surface2);border-radius:22px;transition:.2s}
.toggle .slider::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:var(--text-dim);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--primary)}
.toggle input:checked+.slider::before{background:#fff;transform:translateX(18px)}
.toggle-label{font-size:12px;color:var(--text-dim);min-width:3em}

/* ---- detail btn ---- */
.detail-btn{margin-left:auto;background:var(--surface2);border:none;color:var(--primary);font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer}
.detail-btn:hover{background:var(--border)}

/* ---- logs ---- */
.log-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.log-toolbar h2{font-size:16px;font-weight:600}
.log-toolbar .auto-refresh{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:12px;color:var(--text-dim)}
.log-toolbar .auto-refresh input[type=checkbox]{accent-color:var(--primary)}
.log-box{background:#0a0c12;border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-family:var(--font);font-size:12px;max-height:65vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.log-box .line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-box .line:last-child{border-bottom:none}
.log-box .line:hover{background:rgba(255,255,255,.04)}
.log-box .empty{color:var(--text-dim);text-align:center;padding:40px 0;font-size:13px}
.log-badge{padding:1px 8px;border-radius:4px;font-size:11px;font-family:var(--font)}
.log-badge.DEBUG{color:#8b90a5;background:rgba(139,144,165,.15)}
.log-badge.INFO{color:#6c8cff;background:rgba(108,140,255,.15)}
.log-badge.WARNING{color:#e6a23c;background:rgba(230,162,60,.15)}
.log-badge.ERROR{color:#f56c6c;background:rgba(245,108,108,.15)}

/* ---- modal ---- */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:640px;width:90%;max-height:75vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:16px;font-weight:600}
.modal .close-btn{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:0 4px}
.modal .close-btn:hover{color:var(--text)}
.modal pre{font-family:var(--font);font-size:12px;line-height:1.6;color:var(--text-dim);overflow-x:auto}

/* ---- toast ---- */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green);color:#000}
.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>

<div class="header">
  <h1>pyWinBots</h1>
  <span class="badge">v1.0.0</span>
  <div class="nav">
    <button id="tabDashboard" class="active" data-page="dashboard">Dashboard</button>
    <button id="tabLogs" data-page="logs">Logs</button>
  </div>
</div>

<div class="container">
  <!-- ===== Dashboard ===== -->
  <div id="pageDashboard" class="page active">
    <div class="stats" id="statsRow"></div>
    <div class="search-bar"><input id="searchInput" type="text" placeholder="搜索插件..."></div>
    <div class="plugin-grid" id="pluginGrid"></div>
  </div>

  <!-- ===== Logs ===== -->
  <div id="pageLogs" class="page">
    <div class="log-toolbar">
      <h2>Runtime Logs</h2>
      <label class="auto-refresh"><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
    </div>
    <div class="log-box" id="logBox"><div class="empty">Loading...</div></div>
  </div>
</div>

<!-- Modal -->
<div id="detailModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Plugin Detail</h2>
      <button class="close-btn" id="modalClose">&times;</button>
    </div>
    <div id="modalBody"><pre style="color:var(--text-dim)">Loading...</pre></div>
  </div>
</div>

<script type="module" src="/static/js/app.js?v={{ version }}"></script>

<div id="locationModal" class="modal-overlay">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2 id="locationModalTitle">Location Record</h2>
      <button class="close-btn" id="locationModalClose">&times;</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <input type="hidden" id="locPluginName">
      <div>
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px">Location Name</label>
        <select id="locNameSelect" style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px">
          <option value="" disabled selected>加载中...</option>
        </select>
        <input type="text" id="locNameNew" placeholder="或输入新名称" style="width:100%;padding:8px;margin-top:6px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;display:none">
      </div>
      <div style="display:flex;gap:12px;">
        <div style="flex:1">
          <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px">X (Relative)</label>
          <input type="text" id="locX" disabled style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim)">
        </div>
        <div style="flex:1">
          <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px">Y (Relative)</label>
          <input type="text" id="locY" disabled style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim)">
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px">Window</label>
        <input type="text" id="locWindow" disabled style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:12px">
      </div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button id="btnStartLoc" style="flex:1;padding:10px;background:var(--green);color:#000;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer">Start Record</button>
        <button id="btnCloseLoc" style="flex:1;padding:10px;background:var(--surface2);color:var(--text);border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;display:none">Close</button>
      </div>
      <div id="locStatus" style="font-size:12px;color:var(--text-dim);margin-top:8px;min-height:16px"></div>
    </div>
  </div>
</div>

</body>
</html>
